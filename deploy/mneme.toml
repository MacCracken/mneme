# Mneme — AI-native knowledge base for AGNOS marketplace
# Personal knowledge management with semantic AI, auto-linking,
# and RAG over personal documents.
# Built with Rust; native binary distribution.
#
# Status: MVP — recipe complete, MCP tools integrated, agnoshi intents added.

[package]
name = "mneme"
version = "2026.3.13"
description = "Mneme — AI-native knowledge base & personal notes"
license = "AGPL-3.0"
groups = ["productivity", "knowledge", "rust"]
release = 1
arch = "x86_64"

[source]
local = true
build_dir = "."
github_release = "agnostos/mneme"
release_asset = "mneme-*-linux-x86_64.tar.gz"

[depends]
runtime = [
    "glibc",
    "openssl",
    "sqlite",
]
build = [
    "rust",
    "cargo",
    "openssl-dev",
    "sqlite-dev",
]

[marketplace]
category = "productivity"
runtime = "native"
publisher = "Anomaly"
tags = ["knowledge-base", "notes", "markdown", "semantic-search", "rag", "ai-native"]
min_agnos_version = "2026.3.13"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = true
allowed_hosts = [
    "localhost",
    "127.0.0.1",
    # Daimon agent runtime for RAG, vectors, knowledge
]
data_dir = "~/.local/share/mneme/"

[[marketplace.sandbox.landlock]]
path = "~/.local/share/mneme/"
access = "rw"

[[marketplace.sandbox.landlock]]
path = "/tmp"
access = "rw"

# IPC with AGNOS agent runtime
[[marketplace.sandbox.landlock]]
path = "/run/agnos/"
access = "ro"

[marketplace.services]
ports = [3838]
depends_on = ["agent-runtime"]

[marketplace.mcp]
binary = "mneme-mcp"
tools = 5
transport = "stdio"

[build]
configure = ""
make = "cargo build --release --workspace"
check = "cargo test --workspace"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]

install = """
mkdir -p $PKG/usr/local/bin
mkdir -p $PKG/etc/mneme
mkdir -p $PKG/usr/lib/systemd/system

# Install binaries
install -m 755 target/release/mneme-api $PKG/usr/local/bin/
install -m 755 target/release/mneme-mcp $PKG/usr/local/bin/
install -m 755 target/release/mneme-ui $PKG/usr/local/bin/

# Install systemd units
install -m 644 deploy/mneme.service $PKG/usr/lib/systemd/system/
install -m 644 deploy/mneme-indexer.service $PKG/usr/lib/systemd/system/
install -m 644 deploy/mneme-indexer.timer $PKG/usr/lib/systemd/system/
"""
